<!DOCTYPE html>
<html lang="pt-BR">
<head>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arte — Varjota DigiEdu</title>
  <script>
    window.VD_PAGE = { disciplina: "arte", pageTitle: "Arte" };
  </script>
  <script src="../assets/template-loader.js"></script>
  <script src="../assets/template.js"></script>  <style>
    .disc-hero { text-align: center; padding: 36px 20px 28px; border-bottom: 1px solid var(--vd-border); margin-bottom: 28px; }
    .disc-hero__icon { font-size: 4rem; line-height: 1; margin-bottom: 12px; }
    .disc-hero__title { font-family: 'Lexend', sans-serif; font-size: 2rem; font-weight: 800; color: #C62828; margin-bottom: 8px; }
    .disc-hero__desc { color: var(--vd-muted); font-size: .9375rem; max-width: 500px; margin: 0 auto; line-height: 1.6; }
    .disc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .disc-item { border: 2px dashed var(--vd-border); border-radius: var(--vd-radius); padding: 28px 16px; text-align: center; color: var(--vd-muted); font-size: .875rem; font-weight: 600; transition: border-color .2s, background .2s; cursor: default; }
    .disc-item:hover { border-color: #C62828; background: #FFF5F5; color: #C62828; }
    .disc-item__icon { font-size: 2rem; display: block; margin-bottom: 10px; }
    .disc-item__tag { display: inline-block; margin-top: 8px; font-size: .72rem; background: #f5f5f5; border-radius: 20px; padding: 2px 10px; color: #999; }
  </style>
</head>
<body>
  <div class="disc-hero">
    <div class="disc-hero__icon">🎨</div>
    <h1 class="disc-hero__title">Arte</h1>
    <p class="disc-hero__desc">
      Recursos educacionais, habilidades BNCC e atividades de Arte
      para o Ensino Fundamental — 1º ao 9º ano.
    </p>
  </div>

  <div class="disc-grid">
    <div class="disc-item">
      <span class="disc-item__icon">📋</span>
      Correlação BNCC
      <span class="disc-item__tag">Em breve</span>
    </div>
    <div class="disc-item">
      <span class="disc-item__icon">✏️</span>
      Atividades
      <span class="disc-item__tag">Em breve</span>
    </div>
    <div class="disc-item">
      <span class="disc-item__icon">💻</span>
      REDs
      <span class="disc-item__tag">Em breve</span>
    </div>
    <div class="disc-item">
      <span class="disc-item__icon">📁</span>
      Materiais de Apoio
      <span class="disc-item__tag">Em breve</span>
    </div>
  </div>
</body>
</html>
